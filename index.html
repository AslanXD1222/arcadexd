<head>
    <meta charset="UTF-8">

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0b0b0d; color: #ffffff; padding-bottom: 60px; }
        nav { background-color: #111115; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f1f26; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; font-style: italic; }
        .logo span { color: #ff4757; }
        .nav-btn { background-color: #1c1c24; color: #ccccd2; border: 1px solid #2d2d3d; padding: 8px 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .nav-btn:hover { background-color: #ff4757; color: #fff; }
        .container { max-width: 1400px; margin: 40px auto; padding: 0 40px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 20px; }
        .game-card { background-color: #111115; border: 1px solid #1f1f26; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .game-card:hover { transform: translateY(-5px); border-color: #ff4757; }
        .img-wrapper { width: 100%; padding-top: 60%; position: relative; background-color: #000; }
        .img-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .game-card-footer { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .game-card-title { font-size: 0.95rem; font-weight: 600; color: #e4e4e9; }
        .overlay-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 7, 0.98); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .theater-box { width: 85%; height: 80%; max-width: 1200px; background: #000; border: 1px solid #ff4757; }
        .theater-box iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>

    <nav>
        <div class="logo">Arcade<span>XD</span></div>

        <div class="game-grid" id="arcadeGrid"></div>

        const targetGrid = document.getElementById('arcadeGrid');
        database.forEach(item => {
            const block = document.createElement('div');
            block.className = 'game-card';
            block.onclick = () => { document.getElementById('arcadeFrame').src = item.embed; document.getElementById('theaterPlayer').style.display = 'flex'; };
            block.innerHTML = `<div class="img-wrapper"><img src="${item.image}" alt="${item.title}"></div><div class="game-card-footer"><p class="game-card-title">${item.title}</p></div>`;
            targetGrid.appendChild(block);
        });
        function shutDownGame() { document.getElementById('arcadeFrame').src = ""; document.getElementById('theaterPlayer').style.display = 'none'; }

</body>
</html>
