<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcadeXD | Play Without Limits</title>
    <style>
        /* Base Themes */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0b0b0d;
            color: #ffffff;
            padding-bottom: 60px;
        }

        /* Nav Bar */
        nav {
            background-color: #111115;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f1f26;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 1px;
            font-style: italic;
        }
        .logo span { color: #ff4757; }

        /* User Menu & Auth Buttons */
        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .username {
            font-size: 1rem;
            font-weight: 600;
            color: #dedee3;
        }

        .nav-btn {
            background-color: #1c1c24;
            color: #ccccd2;
            border: 1px solid #2d2d3d;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background-color: #ff4757;
            color: #fff;
            border-color: #ff4757;
        }

        /* Hero Banner with Anime Image */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, rgba(11, 11, 13, 0.8), #0b0b0d), url('https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
            border-bottom: 1px solid #1f1f26;
        }
        .hero h2 {
            font-size: 3.5rem;
            margin: 0 0 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .hero h2 span {
            color: #ff4757;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        .hero p {
            color: #b0b0b8;
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* Main App Grid Layout */
        .container {
            max-width: 1400px;
            margin: 40px auto 0;
            padding: 0 40px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 25px;
            color: #fff;
            border-left: 4px solid #ff4757;
            padding-left: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 20px;
        }

        /* Game Cards */
        .game-card {
            background-color: #111115;
            border: 1px solid #1f1f26;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #ff4757;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.15);
        }

        .img-wrapper {
            width: 100%;
            padding-top: 60%;
            position: relative;
            background-color: #000;
        }
        .img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-card-footer {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-card-title {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #e4e4e9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Dynamic Pop-up Frames (Theater & Login) */
        .overlay-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 7, 0.95);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(5px);
        }
        
        /* Game Player Box */
        .theater-box {
            width: 85%;
            height: 80%;
            max-width: 1200px;
            background: #000;
            border-radius: 8px;
            border: 1px solid #ff4757;
            box-shadow: 0 0 30px rgba(255, 71, 87, 0.2);
        }
        .theater-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
        }

        /* Login Box */
        .login-box {
            background-color: #111115;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #2d2d3d;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .login-box h3 {
            margin-top: 0;
            font-size: 1.5rem;
            color: #fff;
        }
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #0b0b0d;
            border: 1px solid #2d2d3d;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .login-box input:focus {
            outline: none;
            border-color: #ff4757;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8a8a93;
            font-size: 0.9rem;
            margin: 10px 0 20px;
            cursor: pointer;
        }
        .login-actions {
            display: flex;
            gap: 10px;
        }
        .login-actions button {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo">Arcade<span>XD</span></div>
        
        <!-- Auth Section -->
        <div class="user-menu" id="authSection">
            <!-- JavaScript will inject Login or Logout buttons here based on status -->
        </div>
    </nav>

    <!-- Anime/Action Hero Header -->
    <div class="hero">
        <h2>Enter The <span>Zone</span></h2>
        <p>Your personal archive. Instant load times. No limits.</p>
    </div>

    <!-- Main Game Grid -->
    <div class="container">
        <div class="section-title">All Games</div>
        <div class="game-grid" id="arcadeGrid">
            <!-- Games injected by JS -->
        </div>
    </div>

    <!-- Game Player Modal -->
    <div class="overlay-modal" id="theaterPlayer">
        <div class="theater-box">
            <iframe id="arcadeFrame" src=""></iframe>
        </div>
        <div style="margin-top: 15px;">
            <button class="nav-btn" style="border-color: #ff4757; color: #ff4757;" onclick="shutDownGame()">✖ Close Game</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="overlay-modal" id="loginOverlay">
        <div class="login-box">
            <h3>Login to Arcade<span>XD</span></h3>
            <form id="loginForm" onsubmit="processLogin(event)">
                <input type="text" id="usernameInput" placeholder="Username" required autocomplete="off">
                <input type="password" id="passwordInput" placeholder="Password" required>
                
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                
                <div class="login-actions">
                    <button type="submit" class="nav-btn" style="background-color: #ff4757; color: #fff; border: none;">Login</button>
                    <button type="button" class="nav-btn" onclick="closeLogin()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- AUTHENTICATION SYSTEM ---
        const authSection = document.getElementById('authSection');
        const loginOverlay = document.getElementById('loginOverlay');
        const loginForm = document.getElementById('loginForm');

        // Check if user is logged in when the page loads
        function checkLoginStatus() {
            // Check local storage (remembered) or session storage (temporary)
            const savedUser = localStorage.getItem('arcadeUser') || sessionStorage.getItem('arcadeUser');
            
            if (savedUser) {
                // User IS logged in
                authSection.innerHTML = `
                    <span class="username">⚔️ ${savedUser}</span>
                    <button class="nav-btn" onclick="processLogout()">Logout</button>
                `;
            } else {
                // User IS NOT logged in
                authSection.innerHTML = `
                    <button class="nav-btn" onclick="openLogin()">Login</button>
                `;
            }
        }

        // Handle the login form submission
        function processLogin(event) {
            event.preventDefault(); // Stop page from refreshing
            
            const username = document.getElementById('usernameInput').value;
            const remember = document.getElementById('rememberMe').checked;

            if (remember) {
                // Save permanently (until they logout)
                localStorage.setItem('arcadeUser', username);
            } else {
                // Save temporarily (until they close the browser tab)
                sessionStorage.setItem('arcadeUser', username);
            }

            closeLogin();
            checkLoginStatus(); // Update the top right corner
            document.getElementById('loginForm').reset(); // Clear the form
        }

        // Handle Logout
        function processLogout() {
            localStorage.removeItem('arcadeUser');
            sessionStorage.removeItem('arcadeUser');
            checkLoginStatus(); // Update the top right corner back to "Login"
        }

        // Open/Close Login Modal UI
        function openLogin() { loginOverlay.style.display = 'flex'; }
        function closeLogin() { loginOverlay.style.display = 'none'; }

        // Run check immediately on load
        checkLoginStatus();


        // --- GAME SYSTEM ---
        const database = [
          { "title": "Drako IO", "embed": "https://cloud.onlinegames.io/games/2022/unity/drako-io/game.html", "image": "https://www.onlinegames.io/media/posts/1304/responsive/drako-io-xs.webp" },
          { "title": "Stack Fire Ball", "embed": "https://www.onlinegames.io/games/2021/unity/stack-fire-ball/index.html", "image": "https://www.onlinegames.io/media/posts/184/responsive/Stack-Fire-Ball-Game-xs.jpg" },
          { "title": "Love Tester", "embed": "https://www.onlinegames.io/games/2021/3/love-tester/index.html", "image": "https://www.onlinegames.io/media/posts/152/responsive/love-tester-xs.jpg" },
          { "title": "Drift King", "embed": "https://www.onlinegames.io/games/2024/unity/drift-king/index.html", "image": "https://www.onlinegames.io/media/posts/729/responsive/Drift-King-xs.jpg" },
          { "title": "Highway Traffic", "embed": "https://www.onlinegames.io/games/2022/unity/highway-traffic/index.html", "image": "https://www.onlinegames.io/media/posts/32/responsive/Highway-Traffic-2-xs.jpg" },
          { "title": "Stickman GTA City", "embed": "https://cloud.onlinegames.io/games/2024/unity3/stickman-gta-city/index-og.html", "image": "https://www.onlinegames.io/media/posts/900/responsive/stickman-gta-city-free-xs.jpg" },
          { "title": "GTA Simulator", "embed": "https://www.onlinegames.io/games/2023/unity2/gta-simulator/index.html", "image": "https://www.onlinegames.io/media/posts/416/responsive/GTA-Simulator-xs.jpg" },
          { "title": "Stickman Parkour", "embed": "https://cloud.onlinegames.io/games/2024/construct/219/stickman-parkour/index-og.html", "image": "https://www.onlinegames.io/media/posts/871/responsive/stickman-parkour-OG-xs.jpg" },
          { "title": "Golf Bit", "embed": "https://cloud.onlinegames.io/games/2026/construct/328/golf-bit/game.html", "image": "https://www.onlinegames.io/media/posts/1289/responsive/golf-bit-xs.webp" },
          { "title": "Masked Special Forces", "embed": "https://www.onlinegames.io/games/2022/unity2/masked-special-forces/index.html", "image": "https://www.onlinegames.io/media/posts/310/responsive/Masked-Special-Forces-FPS-xs.jpg" },
          { "title": "CS Online", "embed": "https://www.onlinegames.io/games/2023/unity2/cs-online/index.html", "image": "https://www.onlinegames.io/media/posts/434/responsive/CS-Online-xs.jpg" },
          { "title": "Real Flight Simulator", "embed": "https://cloud.onlinegames.io/games/2023/unity2/real-flight-simulator/index.html", "image": "https://www.onlinegames.io/media/posts/342/responsive/Real-Flight-Simulator-2-xs.jpg" },
          { "title": "Get On Top", "embed": "https://www.onlinegames.io/games/2024/code/6/get-on-top/index.html", "image": "https://www.onlinegames.io/media/posts/697/responsive/Get-on-Top-xs.jpg" },
          { "title": "Dublix", "embed": "https://cloud.onlinegames.io/games/2025/unity4/dublix/game-og.html", "image": "https://www.onlinegames.io/media/posts/1126/responsive/dublix-xs.webp" },
          { "title": "Madalin Stunt Cars Pro", "embed": "https://www.onlinegames.io/games/2023/unity/madalin-stunt-cars-pro/index.html", "image": "https://www.onlinegames.io/media/posts/401/responsive/Madalin-Stunt-Cars-Pro-Game-xs.jpg" },
          { "title": "Velocity Rush", "embed": "https://cloud.onlinegames.io/games/2026/unity/velocity-rush/game.html", "image": "https://www.onlinegames.io/media/posts/1265/responsive/velocity-rush-xs.webp" },
          { "title": "Capybara Clicker Pro", "embed": "https://www.onlinegames.io/games/2023/q2/capybara-clicker-pro/index.html", "image": "https://www.onlinegames.io/media/posts/554/responsive/Capybara-Clicker-Pro-xs.jpg" },
          { "title": "Snaker io", "embed": "https://cloud.onlinegames.io/games/2026/more/snaker-io/game.html", "image": "https://www.onlinegames.io/media/posts/1261/responsive/snaker-io-xs.webp" },
          { "title": "Guerrillas io", "embed": "https://www.onlinegames.io/games/2023/unity2/guerrillas-io/index.html", "image": "https://www.onlinegames.io/media/posts/423/responsive/Guerillas-io-xs.jpg" },
          { "title": "Drift Hunters Pro", "embed": "https://www.onlinegames.io/games/2023/unity/drift-hunters-pro/index.html", "image": "https://www.onlinegames.io/media/posts/397/responsive/Drift-Hunters-Pro-xs.jpg" }
        ];

        const targetGrid = document.getElementById('arcadeGrid');
        const overlayBox = document.getElementById('theaterPlayer');
        const dataIframe = document.getElementById('arcadeFrame');

        // Build the game cards dynamically
        database.forEach(item => {
            const block = document.createElement('div');
            block.className = 'game-card';
            block.onclick = () => launchEngine(item.embed);

            block.innerHTML = `
                <div class="img-wrapper">
                    <img src="${item.image}" alt="${item.title}" loading="lazy">
                </div>
                <div class="game-card-footer">
                    <p class="game-card-title">${item.title}</p>
                    <span style="color: #ff4757; font-size: 1.2rem;">▶</span>
                </div>
            `;
            targetGrid.appendChild(block);
        });

        // Open game function
        function launchEngine(sourceUrl) {
            dataIframe.src = sourceUrl;
            overlayBox.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        // Close game function
        function shutDownGame() {
            dataIframe.src = "";
            overlayBox.style.display = 'none';
            document.body.style.overflow = 'auto'; // Re-enable background scrolling
        }
    </script>
</body>
</html>
